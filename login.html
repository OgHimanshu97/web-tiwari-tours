<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Tiwari Tour & Travels</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1503387762-592dee58c160?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
      padding: 24px;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      width: 100%;
      max-width: 450px;
      padding: 48px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: slideUp 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-logo {
      height: 80px;
      margin-bottom: 24px;
    }

    .auth-title {
      font-size: 2rem;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .auth-subtitle {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .auth-form {
      text-align: left;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #E0E0E0;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(255, 69, 0, 0.1);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #999;
      font-size: 0.8rem;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #E0E0E0;
    }

    .auth-divider span {
      padding: 0 12px;
    }

    .google-btn {
      width: 100%;
      padding: 12px;
      background: white;
      border: 1px solid #E0E0E0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-weight: 500;
      color: var(--text-primary);
      transition: background 0.3s ease;
      cursor: pointer;
    }

    .google-btn:hover {
      background: #F5F5F5;
    }

    .google-btn img {
      width: 20px;
      height: 20px;
    }

    .auth-footer {
      margin-top: 32px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .auth-footer a {
      color: var(--accent-primary);
      font-weight: 600;
    }

    .back-home {
      position: absolute;
      top: 32px;
      left: 32px;
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body class="auth-page">
  <a href="index.html" class="back-home">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to Home
  </a>

  <div class="auth-card">
    <img src="public/images/logo.png" alt="Tiwari Travels Logo" class="auth-logo">
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Login to manage your bookings and exclusive offers</p>

    <button id="google-login" class="google-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Continue with Google
    </button>

    <div class="auth-divider">
      <span>or login with email</span>
    </div>

    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="name@example.com" required>
      </div>
      <div class="form-group" style="position: relative;">
        <label for="password">Password</label>
        <div style="position: relative;">
          <input type="password" id="password" placeholder="••••••••" required style="padding-right: 45px;">
          <button type="button" id="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 0; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center;">
            <svg id="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-closed" style="display: none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A10.46 10.46 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <div style="text-align: right; margin-top: 8px;">
          <a href="#" id="forgot-password" style="font-size: 0.8rem; color: var(--accent-primary); font-weight: 500;">Forgot Password?</a>
        </div>
      </div>
      
      <script>
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('toggle-password');
        const eyeOpen = document.getElementById('eye-open');
        const eyeClosed = document.getElementById('eye-closed');

        toggleBtn.addEventListener('click', () => {
          if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeOpen.style.display = 'none';
            eyeClosed.style.display = 'block';
          } else {
            passwordInput.type = 'password';
            eyeOpen.style.display = 'block';
            eyeClosed.style.display = 'none';
          }
        });
      </script>
      <button type="submit" class="btn-primary btn-block" style="border:none; cursor:pointer;">Login</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="#" id="toggle-signup">Sign up</a>
    </div>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="auth.js"></script>
</body>
</html>
